services:
  - type: web
    name: chat-backend
    runtime: python
    # Repo root is the service root so ../frontend/dist is available for the SPA.
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"
